name: SplitBill CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: "22"
  RUST_VERSION: "1.83"

jobs:
  # ──────────────────────────────────────────────
  # Lint
  # ──────────────────────────────────────────────

  lint-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: cd client && npm ci --legacy-peer-deps
      - run: cd client && npx oxlint src/

  lint-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: cd server && npm ci
      - run: cd server && npm run lint

  # ──────────────────────────────────────────────
  # Test
  # ──────────────────────────────────────────────

  test-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract
      - run: cd contract && cargo test

  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: cd client && npm ci --legacy-peer-deps
      - run: cd client && npx vitest run

  test-server:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/splitbill_test
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: cd server && npm ci
      - run: cd server && npx prisma generate
      - run: cd server && npm test

  # ──────────────────────────────────────────────
  # Build
  # ──────────────────────────────────────────────

  build-client:
    runs-on: ubuntu-latest
    needs: [lint-client, test-client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: cd client && npm ci --legacy-peer-deps
      - run: cd client && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 7

  build-server:
    runs-on: ubuntu-latest
    needs: [lint-server, test-server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: cd server && npm ci
      - run: cd server && npx prisma generate
      - run: cd server && npx nest build
      - uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/dist/
          retention-days: 7

  build-contract:
    runs-on: ubuntu-latest
    needs: test-contract
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract
      - run: cd contract && cargo build --target wasm32v1-none --release
      - uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: contract/target/wasm32v1-none/release/*.wasm
          retention-days: 7

  # ──────────────────────────────────────────────
  # Deploy (Manual)
  # ──────────────────────────────────────────────

  deploy-client:
    runs-on: ubuntu-latest
    needs: build-client
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: production
      url: https://xlm-payment-dapp.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: client
          vercel-args: "--prod"

  deploy-server:
    runs-on: ubuntu-latest
    needs: build-server
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: production
      url: https://splitbill-h0q9.onrender.com
    steps:
      - run: echo "Deploy server to Render via webhook or CLI"
